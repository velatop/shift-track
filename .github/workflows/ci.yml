name: ShiftTrack CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --testPathPattern='tests/unit'
        env:
          JWT_SECRET: test_secret_key_for_ci
          NODE_ENV: test

      - name: Run integration tests
        run: npm test -- --testPathPattern='tests/integration'
        env:
          JWT_SECRET: test_secret_key_for_ci
          NODE_ENV: test

      - name: Report results
        if: always()
        run: echo 'All tests completed'
