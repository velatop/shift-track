<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShiftTrack – Dashboard</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

  <nav class="navbar">
    <h1>⚙️ ShiftTrack</h1>
    <div>
      <span id="usernameDisplay"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">

    <div class="alert-banner" id="alertBanner">
      <h3>⚠️ Shifts Without Sufficient Coverage</h3>
      <div id="alertList"></div>
    </div>

    <div class="section-title">📅 Today's Shift Summary</div>
    <div class="summary-grid" id="summaryGrid">
      <p class="loading-text">Loading shifts...</p>
    </div>

  </div>

  <div class="modal-overlay" id="assignModal">
    <div class="modal">
      <h3>Assign Employee</h3>
      <p id="modalShiftInfo"></p>
      <div id="availableList"></div>
      <button class="close-btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/dashboard.js"></script>

</body>

</html>
